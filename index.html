<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mat Pilates Practice Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f0eb;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent}
.top-bar{background:linear-gradient(135deg,#7c6f64,#a1887f);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top-bar h1{font-size:20px;font-weight:600;flex:1}
.back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center}
.back-btn.show{display:flex}
.container{max-width:600px;margin:0 auto;padding:16px}
.welcome{text-align:center;padding:40px 20px}
.welcome h2{font-size:24px;color:#5d4037;margin-bottom:8px}
.welcome p{color:#8d6e63;font-size:15px;margin-bottom:30px}
.routine-card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s;border-left:5px solid #a1887f}
.routine-card:active{transform:scale(.98)}
.routine-card h3{font-size:18px;color:#5d4037;margin-bottom:6px}
.routine-card p{font-size:13px;color:#999}
.block-list{display:flex;flex-direction:column;gap:10px;padding-bottom:100px}
.block-card{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 6px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s;display:flex;align-items:center;gap:14px}
.block-card:active{transform:scale(.98)}
.block-num{background:linear-gradient(135deg,#a1887f,#8d6e63);color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.block-num.warmup{background:linear-gradient(135deg,#66bb6a,#43a047)}
.block-num.cooldown{background:linear-gradient(135deg,#42a5f5,#1e88e5)}
.block-info h4{font-size:16px;color:#5d4037;margin-bottom:3px}
.block-info p{font-size:12px;color:#aaa}
.block-note{font-size:12px;color:#a1887f;font-style:italic;margin-top:2px}
.exercise-view{padding-bottom:100px}
.exercise-header{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.exercise-header h3{font-size:18px;color:#5d4037;margin-bottom:4px}
.exercise-header p{font-size:13px;color:#999}
.exercise-item{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .15s}
.exercise-item.done{background:#f1f8e9}
.exercise-item .check{width:28px;height:28px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .2s}
.exercise-item.done .check{background:#66bb6a;border-color:#66bb6a;color:#fff}
.exercise-item .ex-text{font-size:15px;color:#444;flex:1}
.exercise-item.done .ex-text{color:#999;text-decoration:line-through}
.exercise-item .ex-num{font-size:12px;color:#bbb;font-weight:600;min-width:22px}
.progress-bar-wrap{background:#e0d6cc;height:6px;border-radius:3px;margin-top:12px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#66bb6a,#43a047);border-radius:3px;transition:width .3s}
.block-progress{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05);position:sticky;top:68px;z-index:50}
.block-progress .label{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px}
.completion{text-align:center;padding:60px 20px}
.completion h2{font-size:28px;color:#43a047;margin-bottom:10px}
.completion p{font-size:16px;color:#888;margin-bottom:30px}
.btn{background:linear-gradient(135deg,#a1887f,#8d6e63);color:#fff;border:none;padding:14px 32px;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s}
.btn:active{transform:scale(.96)}
.transition-note{background:#fff8e1;border-radius:12px;padding:14px 18px;margin-bottom:8px;font-size:13px;color:#f57f17;border-left:4px solid #ffc107;font-style:italic}
</style>
</head>
<body>
<div class="top-bar">
  <button class="back-btn" id="backBtn" onclick="goBack()">&#8592;</button>
  <h1 id="topTitle">Pilates Practice Guide</h1>
</div>
<div class="container" id="app"></div>

<script>
const ROUTINE = {
  name: "Mat Pilates",
  equipment: "Mat, Ball, Band, Light Weights",
  blocks: [
    {
      title: "Warm-up",
      type: "warmup",
      exercises: [
        "Seated cross-legged, hand at heart and hand at belly",
        "Seated cat/cow",
        "Rolls L & R",
        "Cat/cow again",
        "Side arm stretch/twist R & L"
      ]
    },
    {
      title: "Block 1: Seated Ball Work with Weights",
      note: "Ball behind back, feet flat on mat",
      exercises: [
        "Full range curl with hands at chest",
        "Pulses with hands at chest",
        "Arms extended out, full range",
        "Pulses with arms extended",
        "Twist right, full range",
        "Hold the twist, pulse",
        "Add right leg lift as you twist, full range",
        "Pulse with right leg up, hold twist",
        "Extend arms and knee as you hold the twist",
        "Pulse with leg and arms extended",
        "Hold wide"
      ],
      footNote: "Repeat on left side — start with the center work too!"
    },
    {
      title: "Block 2: Band Around Knees + Weights",
      note: "Transition: remove ball, grab band. Band around knees, weights by side.",
      exercises: [
        "Arms extended overhead with weights",
        "Full range bridge pose",
        "2 counts up, 2 counts down",
        "Pulses",
        "Add skull crushers with weights as you drop glutes down",
        "Hold weights high",
        "Knees push out on band, full range",
        "Pulses",
        "Tap right and lift, tap left and lift",
        "Circles right",
        "Circles left",
        "End with full range",
        "Pulses",
        "Hold at top"
      ]
    },
    {
      title: "Block 3: Tabletop Glute Series — Right Side",
      note: "Band/Ball. Place ball under left hand.",
      exercises: [
        "Donkey kicks with left leg, full range",
        "Up an inch, down an inch",
        "Pulses",
        "Hold donkey kick — tricep pushup with hand on ball, full range",
        "Tricep pushup pulses",
        "Extend arm and leg",
        "Hold and pulse back in",
        "Come back to palm on ball, rainbows R & L",
        "Full range lift",
        "Pulses",
        "Elbow to knee and extend",
        "Taps to corner of mat and lift — end with hold"
      ]
    },
    {
      title: "Block 4: Standing Glute Series — Right Side",
      note: "Band/Ball",
      exercises: [
        "Full range lunge — lift and lower in lunge, with hinge",
        "Single pulses",
        "Lift/lower front heel",
        "Warrior 3 — tap and lift",
        "Warrior 3 pulses",
        "Back to lunge, full range twists",
        "Hold twist and pulse",
        "Flow: lunge → inhale warrior 3 lift arms → exhale twist → back to lunge"
      ]
    },
    {
      title: "Block 5: Core/Arm Series — R & L Together",
      note: "Transition: Standing mountain knee drives with ball, come down to high plank.",
      exercises: [
        "High plank — knee drives / toe taps x3",
        "Serve the platter, both arms",
        "Alternate serves R & L",
        "Hold out, pulse",
        "Flip up and down",
        "Over under",
        "Open wide — repeat with arms out",
        "End with a hold"
      ]
    },
    {
      title: "Block 6: Tabletop Glute Series — Left Side",
      note: "Repeat Block 3 on left side",
      isRepeat: true,
      repeatOf: 3,
      exercises: [
        "Donkey kicks with right leg, full range",
        "Up an inch, down an inch",
        "Pulses",
        "Hold donkey kick — tricep pushup with hand on ball, full range",
        "Tricep pushup pulses",
        "Extend arm and leg",
        "Hold and pulse back in",
        "Come back to palm on ball, rainbows R & L",
        "Full range lift",
        "Pulses",
        "Elbow to knee and extend",
        "Taps to corner of mat and lift — end with hold"
      ]
    },
    {
      title: "Block 7: Standing Glute Series — Left Side",
      note: "Repeat Block 4 on left side",
      isRepeat: true,
      repeatOf: 4,
      exercises: [
        "Full range lunge — lift and lower in lunge, with hinge",
        "Single pulses",
        "Lift/lower front heel",
        "Warrior 3 — tap and lift",
        "Warrior 3 pulses",
        "Back to lunge, full range twists",
        "Hold twist and pulse",
        "Flow: lunge → inhale warrior 3 lift arms → exhale twist → back to lunge"
      ]
    },
    {
      title: "Block 8: Sideline — Right Side",
      note: "Transition: Side plank high L to R, land on left side",
      exercises: [
        "Up for 3, down fast",
        "Up fast, down for 3",
        "Pulses for 8",
        "Circles front/back",
        "Pulses",
        "Back leg flat to back of mat — front leg extends, raises full range",
        "Pulses",
        "Teaser lifts",
        "Teaser pulses",
        "Back leg goes in front of mat — inner thigh",
        "Full range",
        "Pulses",
        "Circles front and back",
        "Swings forward and back",
        "Teaser lifts — hold full teaser to finish"
      ]
    },
    {
      title: "Block 9: Sideline — Left Side",
      note: "Transition: Side plank high L to R, land on right side. Repeat Block 8.",
      isRepeat: true,
      repeatOf: 8,
      exercises: [
        "Up for 3, down fast",
        "Up fast, down for 3",
        "Pulses for 8",
        "Circles front/back",
        "Pulses",
        "Back leg flat to back of mat — front leg extends, raises full range",
        "Pulses",
        "Teaser lifts",
        "Teaser pulses",
        "Back leg goes in front of mat — inner thigh",
        "Full range",
        "Pulses",
        "Circles front and back",
        "Swings forward and back",
        "Teaser lifts — hold full teaser to finish"
      ]
    },
    {
      title: "Block 10: Final Core & Stretch",
      type: "cooldown",
      exercises: [
        "Hip lifts x8",
        "Pulses up x16",
        "Pulses with legs down x16",
        "Low hold",
        "Stretch — side twists",
        "Happy baby",
        "Glute bridge",
        "Bound angle",
        "Savasana — rest"
      ]
    }
  ]
};

let currentScreen = 'home';
let currentBlock = -1;
let checked = {};

function getStorageKey() { return 'pilates_checked_v2'; }
function loadChecked() { try { checked = JSON.parse(localStorage.getItem(getStorageKey()) || '{}'); } catch(e) { checked = {}; } }
function saveChecked() { try { localStorage.setItem(getStorageKey(), JSON.stringify(checked)); } catch(e) {} }

function getTotalExercises() { return ROUTINE.blocks.reduce((s, b) => s + b.exercises.length, 0); }
function getTotalDone() { let c = 0; ROUTINE.blocks.forEach((b, bi) => b.exercises.forEach((_, ei) => { if (checked[bi + '_' + ei]) c++; })); return c; }
function getBlockDone(bi) { let c = 0; ROUTINE.blocks[bi].exercises.forEach((_, ei) => { if (checked[bi + '_' + ei]) c++; }); return c; }

function render() {
  const app = document.getElementById('app');
  const backBtn = document.getElementById('backBtn');
  const title = document.getElementById('topTitle');

  if (currentScreen === 'home') {
    backBtn.classList.remove('show');
    title.textContent = 'Pilates Practice Guide';
    const total = getTotalExercises();
    const done = getTotalDone();
    const pct = total ? Math.round(done / total * 100) : 0;
    app.innerHTML = `
      <div class="welcome">
        <h2>Ready to Practice</h2>
        <p>Tap your routine to get started</p>
      </div>
      <div class="routine-card" onclick="openRoutine()">
        <h3>${ROUTINE.name}</h3>
        <p>${ROUTINE.blocks.length} blocks &middot; ${total} exercises &middot; ${ROUTINE.equipment}</p>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <p style="margin-top:8px;font-size:12px;color:#aaa">${done}/${total} completed (${pct}%)</p>
      </div>
      ${done > 0 ? '<div style="text-align:center;margin-top:20px"><button class="btn" style="background:#e57373;font-size:14px;padding:10px 24px" onclick="resetAll()">Reset Progress</button></div>' : ''}
    `;
  } else if (currentScreen === 'blocks') {
    backBtn.classList.add('show');
    title.textContent = ROUTINE.name;
    let html = '<div class="block-list">';
    ROUTINE.blocks.forEach((block, i) => {
      const done = getBlockDone(i);
      const total = block.exercises.length;
      const pct = total ? Math.round(done / total * 100) : 0;
      const numClass = block.type === 'warmup' ? 'warmup' : block.type === 'cooldown' ? 'cooldown' : '';
      const label = block.type === 'warmup' ? '\u2600' : block.type === 'cooldown' ? '\u2744' : (i);
      html += `
        <div class="block-card" onclick="openBlock(${i})">
          <div class="block-num ${numClass}">${label}</div>
          <div class="block-info" style="flex:1">
            <h4>${block.title}</h4>
            <p>${total} exercises${block.isRepeat ? ' (repeat)' : ''} &middot; ${done}/${total}</p>
            ${block.note ? '<div class="block-note">' + block.note + '</div>' : ''}
            <div class="progress-bar-wrap" style="margin-top:8px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    });
    html += '</div>';
    app.innerHTML = html;
  } else if (currentScreen === 'exercises') {
    backBtn.classList.add('show');
    const block = ROUTINE.blocks[currentBlock];
    title.textContent = block.title;
    const done = getBlockDone(currentBlock);
    const total = block.exercises.length;
    const pct = total ? Math.round(done / total * 100) : 0;

    let html = '';
    if (done === total) {
      html += `<div class="completion"><h2>\u2705 Block Complete!</h2><p>Great work on ${block.title}</p>
        <button class="btn" onclick="nextBlock()" style="margin-bottom:12px">${currentBlock < ROUTINE.blocks.length - 1 ? 'Next Block \u2192' : 'Back to Overview'}</button>
        <br><button class="btn" style="background:#e57373;font-size:14px;padding:10px 24px;margin-top:12px" onclick="resetBlock(${currentBlock})">Redo Block</button></div>`;
    } else {
      html += `<div class="block-progress"><div class="label"><span>${block.title}</span><span>${done}/${total}</span></div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div></div>`;
      if (block.note) html += `<div class="transition-note">${block.note}</div>`;
      if (block.footNote) html += `<div class="transition-note" style="border-left-color:#a1887f;color:#8d6e63">${block.footNote}</div>`;
      html += '<div class="exercise-view">';
      block.exercises.forEach((ex, ei) => {
        const key = currentBlock + '_' + ei;
        const isDone = checked[key];
        html += `<div class="exercise-item ${isDone ? 'done' : ''}" onclick="toggleEx(${currentBlock},${ei})">
          <div class="ex-num">${ei + 1}</div>
          <div class="check">${isDone ? '\u2713' : ''}</div>
          <div class="ex-text">${ex}</div>
        </div>`;
      });
      html += '</div>';
    }
    app.innerHTML = html;
  }
}

function openRoutine() { currentScreen = 'blocks'; render(); window.scrollTo(0, 0); }
function openBlock(i) { currentScreen = 'exercises'; currentBlock = i; render(); window.scrollTo(0, 0); }
function goBack() {
  if (currentScreen === 'exercises') { currentScreen = 'blocks'; }
  else if (currentScreen === 'blocks') { currentScreen = 'home'; }
  render(); window.scrollTo(0, 0);
}
function toggleEx(bi, ei) {
  const key = bi + '_' + ei;
  checked[key] = !checked[key];
  saveChecked();
  render();
}
function nextBlock() {
  if (currentBlock < ROUTINE.blocks.length - 1) { currentBlock++; render(); }
  else { currentScreen = 'blocks'; render(); }
  window.scrollTo(0, 0);
}
function resetBlock(bi) {
  ROUTINE.blocks[bi].exercises.forEach((_, ei) => { delete checked[bi + '_' + ei]; });
  saveChecked(); render();
}
function resetAll() {
  if (confirm('Reset all progress?')) { checked = {}; saveChecked(); render(); }
}

loadChecked();
render();
</script>
</body>
</html>
