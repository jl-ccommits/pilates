<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilates & Yoga Routine Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e8eaf6;
      --text-mid: #9094b0;
      --text-dim: #5a5f7a;
      --slate: #3b4a6b;
      --slate-light: #4a5a80;
      --rose: #6b3b5a;
      --rose-light: #7a4a6b;
      --teal: #2d5a5a;
      --teal-light: #3a6b6b;
      --sage: #3b5a3b;
      --sage-light: #4a6b4a;
      --amber: #5a4a2d;
      --amber-light: #6b5a3a;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .routine-name {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      min-width: 0;
      word-break: break-word;
    }

    .routine-name.editable {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: background-color 0.2s;
    }

    .routine-name.editable:hover {
      background-color: var(--surface2);
    }

    .routine-name input {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 18px;
      font-weight: 600;
    }

    .discipline-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .discipline-badge:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .edit-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .edit-toggle:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .edit-toggle.active {
      background-color: #16a34a;
      border-color: #22c55e;
    }

    /* Progress Bar */
    .progress-section {
      margin-bottom: 16px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background-color: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text-mid);
    }

    .start-fresh-btn {
      padding: 6px 12px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .start-fresh-btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    /* Equipment Filter */
    .equipment-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .equipment-chip {
      padding: 6px 12px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .equipment-chip.active {
      background-color: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* Edit Toolbar */
    .edit-toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 12px;
      padding: 8px;
      background-color: rgba(255,255,255,0.02);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
    }

    .toolbar-btn {
      padding: 6px 10px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .toolbar-btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .toolbar-btn.delete {
      color: #ff6b6b;
    }

    .toolbar-btn.delete:hover {
      background-color: #ff6b6b;
      color: var(--bg);
    }

    .color-picker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .color-option {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .color-option:hover,
    .color-option.selected {
      border-color: var(--text);
      transform: scale(1.1);
    }

    /* Blocks & Cards */
    .blocks-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .block-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s;
    }

    .block-card:hover {
      border-color: var(--border-bright);
    }

    .block-card.transition-card {
      padding: 12px 16px;
      background-color: var(--surface2);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .block-card.transition-card .block-header {
      margin-bottom: 0;
    }

    .block-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      background-color: var(--surface);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .block-card.transition-card .block-header {
      border-bottom: none;
      padding: 0;
      margin: 0;
    }

    .block-emoji {
      font-size: 24px;
      min-width: 32px;
      text-align: center;
    }

    .block-emoji.editable {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: background-color 0.2s;
    }

    .block-emoji.editable:hover {
      background-color: var(--surface2);
    }

    .block-title {
      flex: 1;
      font-weight: 600;
      font-size: 15px;
    }

    .block-title.editable {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: background-color 0.2s;
    }

    .block-title.editable:hover {
      background-color: var(--surface2);
    }

    .block-title input {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      width: 100%;
    }

    .equipment-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .equipment-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-mid);
    }

    .toggle-arrow {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .toggle-arrow.collapsed {
      transform: rotate(-90deg);
    }

    .block-content {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-height: 2000px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .block-content.collapsed {
      max-height: 0;
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .step-checkbox {
      width: 20px;
      height: 20px;
      min-width: 20px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .step-content {
      flex: 1;
      min-width: 0;
    }

    .step-emoji {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .step-name {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .step-detail {
      font-size: 13px;
      color: var(--text-mid);
    }

    .pulse-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      background: linear-gradient(90deg, #ff6b6b, #ff8c8c);
      color: white;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .step-row.checked {
      opacity: 0.6;
    }

    .step-row.checked .step-name {
      text-decoration: line-through;
    }

    /* Edit Mode Step Row */
    .step-row-edit {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      align-items: flex-start;
    }

    .step-row-edit input {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
    }

    .step-row-edit input[type="text"] {
      flex: 1;
    }

    .step-emoji-input {
      width: 40px;
      padding: 6px;
      text-align: center;
      font-size: 18px;
    }

    .step-action-buttons {
      display: flex;
      gap: 4px;
    }

    .step-action-buttons button {
      padding: 4px 6px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .step-action-buttons button:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .step-action-buttons button.delete:hover {
      background-color: #ff6b6b;
      color: var(--bg);
    }

    .add-step-btn {
      padding: 10px 16px;
      background-color: var(--surface2);
      border: 1px dashed var(--border-bright);
      color: var(--text-mid);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      margin: 12px 16px;
    }

    .add-step-btn:hover {
      background-color: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .add-block-btn {
      padding: 12px 16px;
      background-color: var(--surface2);
      border: 2px dashed var(--border-bright);
      color: var(--text-mid);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
      margin-bottom: 24px;
    }

    .add-block-btn:hover {
      background-color: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* GitHub Banner */
    .gh-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .gh-banner-text {
      flex: 1;
    }

    .gh-setup-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      margin-left: 4px;
    }

    .gh-setup-link:hover {
      color: var(--accent2);
    }

    /* Edit Mode Top Bar */
    .edit-top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .edit-top-bar button {
      flex: 1;
      min-width: 120px;
      padding: 10px 16px;
      background-color: var(--accent);
      border: 1px solid var(--accent);
      color: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }

    .edit-top-bar button:hover {
      background-color: var(--accent2);
      border-color: var(--accent2);
    }

    .new-routine-dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background-color: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-sm);
      min-width: 200px;
      z-index: 1000;
      margin-top: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .dropdown-menu button {
      width: 100%;
      text-align: left;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: background-color 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-menu button:last-child {
      border-bottom: none;
    }

    .dropdown-menu button:hover {
      background-color: var(--surface2);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 16px;
    }

    .modal {
      background-color: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-mid);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      margin-bottom: 20px;
      color: var(--text-mid);
      font-size: 14px;
      line-height: 1.6;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-weight: 500;
      font-size: 13px;
      color: var(--text);
    }

    .form-input {
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 247, 0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-button {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-bright);
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: all 0.2s;
    }

    .modal-button.primary {
      background-color: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .modal-button.primary:hover {
      background-color: var(--accent2);
      border-color: var(--accent2);
    }

    .modal-button.secondary {
      background-color: var(--surface2);
      color: var(--text);
    }

    .modal-button.secondary:hover {
      background-color: var(--surface2);
      border-color: var(--border-bright);
    }

    .discipline-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    /* Routine Library Panel */
    .library-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      max-width: 400px;
      background-color: var(--surface);
      border-left: 1px solid var(--border-bright);
      z-index: 9000;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s ease;
      box-shadow: -8px 0 24px rgba(0,0,0,0.3);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    .library-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-bright);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .library-title {
      font-size: 16px;
      font-weight: 700;
    }

    .library-close {
      background: none;
      border: none;
      color: var(--text-mid);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .library-close:hover {
      color: var(--text);
    }

    .library-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .library-empty {
      text-align: center;
      color: var(--text-mid);
      padding: 32px 16px;
      font-size: 14px;
    }

    .routine-card {
      background-color: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .routine-card:hover {
      border-color: var(--accent);
    }

    .routine-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .routine-card-title {
      font-weight: 600;
      font-size: 14px;
      flex: 1;
    }

    .routine-card-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--text-mid);
    }

    .routine-card-buttons {
      display: flex;
      gap: 8px;
    }

    .routine-card-btn {
      flex: 1;
      padding: 6px 10px;
      background-color: var(--surface);
      border: 1px solid var(--border-bright);
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .routine-card-btn:hover {
      background-color: var(--accent);
      border-color: var(--accent);
    }

    .routine-card-btn.delete:hover {
      background-color: #ff6b6b;
      color: var(--bg);
    }

    .library-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.5);
      z-index: 8900;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 540px) {
      .container {
        padding: 0 12px;
      }

      .header {
        padding: 12px 0;
      }

      .edit-top-bar {
        flex-direction: column;
      }

      .edit-top-bar button {
        min-width: auto;
      }

      .library-panel {
        max-width: 100%;
      }

      .modal {
        padding: 16px;
      }
    }

    /* Utility */
    .hidden {
      display: none !important;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
    }

    .success {
      color: #22c55e;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="routine-name" id="routineName">My Pilates Routine</div>
      <div class="discipline-badge" id="disciplineBadge">­¤¦ś Yoga</div>
      <button class="edit-toggle" id="editToggle">Ō£Å’ĖÅ Edit</button>

    // ===== UTILITY FUNCTIONS =====

    function deepCopy(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function getEquipmentList() {
      const equipment = new Set();
      blocks.forEach(block => {
        block.equipment.forEach(e => equipment.add(e));
      });
      return Array.from(equipment).sort();
    }

    function shouldShowBlock(block) {
      if (activeEquipmentFilter.size === 0) return true;
      if (block.id.startsWith('t') || block.title === 'Transition') return true;
      return block.equipment.some(e => activeEquipmentFilter.has(e));
    }

    function updateProgress() {
      const visibleBlocks = blocks.filter(shouldShowBlock);
      let totalSteps = 0;
      let checkedCount = 0;
      visibleBlocks.forEach((block, blockIdx) => {
        const actualBlockIdx = blocks.indexOf(block);
        if (!block.id.startsWith('t') && block.title !== 'Transition') {
          block.steps.forEach((step, stepIdx) => {
            totalSteps++;
            if (checkedSteps[`${actualBlockIdx}_${stepIdx}`]) {
              checkedCount++;
            }
          });
        }
      });
      const percent = totalSteps === 0 ? 0 : Math.round((checkedCount / totalSteps) * 100);
      document.getElementById('progressPercent').textContent = percent;
      document.getElementById('progressFill').style.width = percent + '%';
    }

    function renderEquipmentFilter() {
      const container = document.getElementById('equipmentFilter');
      const equipment = getEquipmentList();
      if (equipment.length === 0) {
        container.innerHTML = '';
        return;
      }
      container.innerHTML = equipment.map(e => {
        const isActive = activeEquipmentFilter.has(e);
        return `<button class="equipment-chip ${isActive ? 'active' : ''}" data-equipment="${e}" data-action="toggle-equipment">${e}</button>`;
      }).join('');
    }

    function renderBlocks() {
      const container = document.getElementById('blocksContainer');
      const visibleBlocks = blocks.filter(shouldShowBlock);
      
      container.innerHTML = visibleBlocks.map((block, displayIdx) => {
        const actualBlockIdx = blocks.indexOf(block);
        const isTransition = block.id.startsWith('t') || block.title === 'Transition';
        
        if (isTransition) {
          return renderTransitionCard(block, actualBlockIdx);
        } else {
          return renderBlockCard(block, actualBlockIdx, displayIdx);
        }
      }).join('');

      if (editMode) {
        container.innerHTML += `<button class="add-block-btn" data-action="add-block">+ Add Block</button>`;
      }
    }

    function renderTransitionCard(block, blockIdx) {
      const step = block.steps[0] || {};
      return `
        <div class="block-card transition-card">
          <div class="block-header">
            <span class="block-emoji">${block.homeEmoji}</span>
            <span class="block-title">${block.title}</span>
          </div>
        </div>
      `;
    }

    function renderBlockCard(block, blockIdx, displayIdx) {
      const isCollapsed = collapsedBlocks[blockIdx] !== false;
      const stepsCount = block.steps.length;
      const checkedCount = block.steps.filter((_, i) => checkedSteps[`${blockIdx}_${i}`]).length;
      const isTransition = block.id.startsWith('t') || block.title === 'Transition';

      let html = `
        <div class="block-card" data-block-idx="${blockIdx}">
          <div class="block-header" data-action="toggle-collapse" data-block-idx="${blockIdx}">
            <span class="block-emoji ${editMode ? 'editable' : ''}" data-action="edit-emoji" data-block-idx="${blockIdx}">${block.homeEmoji}</span>
            <div style="flex: 1; min-width: 0;">
              <div class="block-title ${editMode ? 'editable' : ''}" data-action="edit-title" data-block-idx="${blockIdx}">${block.title}</div>
              <div class="equipment-badges">${block.equipment.map(e => `<div class="equipment-badge">${e}</div>`).join('')}</div>
            </div>
            <div class="toggle-arrow ${isCollapsed ? 'collapsed' : ''}"></div>
          </div>
      `;

      if (editMode) {
        html += renderEditToolbar(block, blockIdx, displayIdx);
      }

      html += `<div class="block-content ${isCollapsed ? 'collapsed' : ''}">`;

      if (editMode) {
        html += renderEditSteps(block, blockIdx);
        html += `<button class="add-step-btn" data-action="add-step" data-block-idx="${blockIdx}">+ Add Step</button>`;
      } else {
        html += renderViewSteps(block, blockIdx);
      }

      html += `</div></div>`;
      return html;
    }

    function renderEditToolbar(block, blockIdx, displayIdx) {
      const canMoveUp = displayIdx > 0;
      const canMoveDown = displayIdx < blocks.filter(shouldShowBlock).length - 1;
      
      let html = `<div class="edit-toolbar">`;
      html += `<button class="toolbar-btn" data-action="move-block-up" data-block-idx="${blockIdx}" ${!canMoveUp ? 'disabled' : ''}>Ōåæ</button>`;
      html += `<button class="toolbar-btn" data-action="move-block-down" data-block-idx="${blockIdx}" ${!canMoveDown ? 'disabled' : ''}>Ōåō</button>`;
      html += `<div style="flex: 1;"></div>`;
      
      const currentColor = COLOR_OPTIONS.find(c => c.color === block.color);
      html += `<div style="display: flex; gap: 6px; align-items: center;">
        <span style="font-size: 12px; color: var(--text-mid);">Color:</span>
        <div class="color-picker-grid" style="grid-template-columns: repeat(6, 1fr); width: auto; gap: 4px;">`;
      
      COLOR_OPTIONS.forEach(colorOpt => {
        const isSelected = block.color === colorOpt.color;
        html += `<div class="color-option ${isSelected ? 'selected' : ''}" style="background: ${colorOpt.color};" data-action="set-block-color" data-block-idx="${blockIdx}" data-color="${colorOpt.name}"></div>`;
      });
      
      html += `</div></div>`;
      html += `<button class="toolbar-btn delete" data-action="delete-block" data-block-idx="${blockIdx}">­¤Śæ’ĖÅ</button>`;
      html += `</div>`;
      return html;
    }

    function renderViewSteps(block, blockIdx) {
      return block.steps.map((step, stepIdx) => {
        const isChecked = checkedSteps[`${blockIdx}_${stepIdx}`];
        return `
          <div class="step-row ${isChecked ? 'checked' : ''}" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}">
            <input type="checkbox" class="step-checkbox" data-action="toggle-step" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}" ${isChecked ? 'checked' : ''}>
            <div class="step-content">
              <div class="step-emoji">${step.emoji}</div>
              <div class="step-name">${step.name}${step.isPulse ? '<span class="pulse-badge">PULSE</span>' : ''}</div>
              <div class="step-detail">${step.detail}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEditSteps(block, blockIdx) {
      if (block.steps.length === 0) {
        return `<div style="padding: 16px; text-align: center; color: var(--text-mid); font-size: 13px;">+ Add your first step</div>`;
      }
      return block.steps.map((step, stepIdx) => {
        return `
          <div class="step-row-edit">
            <input type="text" class="step-emoji-input" value="${step.emoji}" data-action="edit-step-emoji" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}">
            <input type="text" placeholder="Step name" value="${step.name}" data-action="edit-step-name" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}">
            <input type="text" placeholder="Detail" value="${step.detail}" data-action="edit-step-detail" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}">
            <div class="step-action-buttons">
              <button data-action="toggle-pulse" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}" title="Toggle pulse">${step.isPulse ? 'Ō£ō' : 'ŌŚŗ'}</button>
              <button data-action="delete-step" data-block-idx="${blockIdx}" data-step-idx="${stepIdx}" class="delete">Ō£Ģ</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function render() {
      renderEquipmentFilter();
      renderBlocks();
      updateProgress();
      updateHeader();
    }

    function updateHeader() {
      const nameEl = document.getElementById('routineName');
      if (editMode) {
        if (!nameEl.querySelector('input')) {
          nameEl.innerHTML = `<input type="text" value="${routineName}" data-action="edit-routine-name">`;

    // ===== EVENT DELEGATION =====

    document.addEventListener('change', (e) => {
      if (e.target.classList.contains('step-checkbox')) {

        }
        updateProgress();
      }

    document.addEventListener('input', (e) => {

        routineName = e.target.value;
      } else if (e.target.dataset.action === 'edit-step-emoji') {
        const blockIdx = parseInt(e.target.dataset.blockIdx);
        const stepIdx = parseInt(e.target.dataset.stepIdx);
        blocks[blockIdx].steps[stepIdx].emoji = e.target.value;
      } else if (e.target.dataset.action === 'edit-step-name') {
        const blockIdx = parseInt(e.target.dataset.blockIdx);
        const stepIdx = parseInt(e.target.dataset.stepIdx);
        blocks[blockIdx].steps[stepIdx].name = e.target.value;
      } else if (e.target.dataset.action === 'edit-step-detail') {
        const blockIdx = parseInt(e.target.dataset.blockIdx);
        const stepIdx = parseInt(e.target.dataset.stepIdx);
        blocks[blockIdx].steps[stepIdx].detail = e.target.value;
      }
    });

    document.addEventListener('click', (e) => {
      const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
      if (!action) return;

      const blockIdx = e.target.dataset.blockIdx ? parseInt(e.target.dataset.blockIdx) : null;
      const stepIdx = e.target.dataset.stepIdx ? parseInt(e.target.dataset.stepIdx) : null;

      switch (action) {
        case 'toggle-collapse':
          if (blockIdx !== null) {
            collapsedBlocks[blockIdx] = (collapsedBlocks[blockIdx] !== false) ? false : true;
            render();
          }
          break;

        case 'toggle-step':
          break; // handled by change event

        case 'toggle-equipment':
          const equipment = e.target.dataset.equipment;
          if (activeEquipmentFilter.has(equipment)) {
            activeEquipmentFilter.delete(equipment);
          } else {
            activeEquipmentFilter.add(equipment);
          }
          render();
          break;

        case 'start-fresh':
          checkedSteps = {};
          render();
          break;

        case 'edit':
          editMode = !editMode;
          collapsedBlocks = {};
          render();
          break;

        case 'edit-emoji':
          if (editMode && blockIdx !== null) {
            const emoji = prompt('Enter emoji:', blocks[blockIdx].homeEmoji);
            if (emoji) {
              blocks[blockIdx].homeEmoji = emoji;
              render();
            }
          }
          break;

        case 'edit-title':
          if (editMode && blockIdx !== null) {
            const currentTitle = blocks[blockIdx].title;
            const title = prompt('Block title:', currentTitle);
            if (title !== null) {
              blocks[blockIdx].title = title;
              render();
            }
          }
          break;

        case 'set-block-color':
          if (blockIdx !== null) {
            const colorName = e.target.dataset.color;
            const colorOpt = COLOR_OPTIONS.find(c => c.name === colorName);
            blocks[blockIdx].color = colorOpt.color;
            blocks[blockIdx].colorLight = colorOpt.colorLight;
            render();
          }
          break;

        case 'delete-block':
          if (blockIdx !== null && confirm('Delete this block?')) {
            blocks.splice(blockIdx, 1);
            render();
          }
          break;

        case 'move-block-up':
          if (blockIdx !== null && blockIdx > 0) {
            [blocks[blockIdx - 1], blocks[blockIdx]] = [blocks[blockIdx], blocks[blockIdx - 1]];
            render();
          }
          break;

        case 'move-block-down':
          if (blockIdx !== null && blockIdx < blocks.length - 1) {
            [blocks[blockIdx], blocks[blockIdx + 1]] = [blocks[blockIdx + 1], blocks[blockIdx]];
            render();
          }
          break;

        case 'add-step':
          if (blockIdx !== null) {
            blocks[blockIdx].steps.push({ name: '', detail: '', emoji: 'Ō£©', isPulse: false });
            render();
          }
          break;

        case 'delete-step':
          if (blockIdx !== null && stepIdx !== null) {
            blocks[blockIdx].steps.splice(stepIdx, 1);
            render();
          }
          break;

        case 'toggle-pulse':
          if (blockIdx !== null && stepIdx !== null) {
            blocks[blockIdx].steps[stepIdx].isPulse = !blocks[blockIdx].steps[stepIdx].isPulse;
            render();
          }
          break;

        case 'add-block':
          blocks.push({
            id: `block${Date.now()}`,
            title: 'New Block',
            homeEmoji: 'Ō£©',
            equipment: [],
            color: 'var(--slate)',
            colorLight: 'var(--slate-light)',
            steps: []
          });
          render();
          break;

        case 'save-routine':
          showSaveModal();
          break;

        case 'load-routines':
          showLibraryPanel();
          break;

        case 'close-library':
          document.getElementById('libraryPanel').classList.add('hidden');
          document.getElementById('libraryOverlay').classList.add('hidden');
          break;

        case 'setup-github':

            routineName = 'My Pilates Routine';

          }
          break;

        case 'new-yoga':

        case 'new-blank':
          if (confirm('Start blank? Any unsaved changes will be lost.')) {
            blocks = [{
              id: 'warmup',
              title: 'Warm-up',
              homeEmoji: '­¤īģ',
              equipment: [],
              color: 'var(--amber)',

            }, {

            discipline = 'custom';
            routineName = 'My Routine';
            checkedSteps = {};
            collapsedBlocks = {};

            render();
          }
          break;

        case 'toggle-discipline':
          if (editMode) {
            showDisciplineModal();
          }
          break;
      }
    });

      e.preventDefault();

    function showSaveModal() {
      const html = `
        <div class="modal-header">Save Routine</div>

        <form class="modal-form" onsubmit="handleSaveRoutine(event)">

    async function handleSaveRoutine(e) {
      e.preventDefault();
      const routineName2 = document.getElementById('saveRoutineName').value;
      const statusEl = document.getElementById('saveStatus');
      statusEl.innerHTML = '<div style="color: var(--text-mid); font-size: 12px;">Saving...</div>';
      
      try {
        const token = localStorage.getItem('gh_token');
        if (!token) throw new Error('GitHub token not set');
        
        const timestamp = Date.now();
        const slug = slugify(routineName2);
        const filename = `routines/${timestamp}-${slug}.json`;
        const content = { name: routineName2, type: discipline, savedAt: new Date().toISOString(), blocks };
        
        const ghUrl = `https://api.github.com/repos/jl-ccommits/pilates/contents/${filename}`;
        const resp = await fetch(ghUrl, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: `Save routine: ${routineName2}`,
            content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
            branch: 'sandbox'
          })
        });
        
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.message || 'Save failed');
        }
        
        statusEl.innerHTML = '<div class="success">Saved!</div>';
        setTimeout(() => document.getElementById('modalContainer').innerHTML = '', 1500);
      } catch (err) {
        statusEl.innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    }

    function showLibraryPanel() {
      document.getElementById('libraryOverlay').classList.remove('hidden');
      document.getElementById('libraryPanel').classList.remove('hidden');
      loadRoutinesList();
    }

    async function loadRoutinesList() {
      const content = document.getElementById('libraryContent');
      content.innerHTML = '<div style="color: var(--text-mid); padding: 16px;">Loading...</div>';
      
      try {
        const token = localStorage.getItem('gh_token');
        if (!token) throw new Error('GitHub token not set');
        
        const resp = await fetch('https://api.github.com/repos/jl-ccommits/pilates/contents/routines?ref=sandbox', {
          headers: { Authorization: `token ${token}` }
        });
        
        if (!resp.ok) throw new Error('Failed to load routines');
        
        const files = await resp.json();
        if (!Array.isArray(files)) throw new Error('Invalid response');
        
        const routines = [];
        for (const file of files) {
          if (!file.name.endsWith('.json')) continue;
          const fileResp = await fetch(file.download_url);
          const data = await fileResp.json();
          routines.push({ ...data, filename: file.name, sha: file.sha });
        }
        
        if (routines.length === 0) {
          content.innerHTML = '<div class="library-empty">No saved routines yet. Save your first routine!</div>';
          return;
        }
        
        content.innerHTML = routines.map(r => `
          <div class="routine-card">
            <div class="routine-card-header">
              <div class="routine-card-title">${r.name}</div>
            </div>
            <div class="routine-card-meta">
              <span>${r.type === 'yoga' ? '­¤¦ś' : '­¤Åŗ’ĖÅ'} ${r.type.charAt(0).toUpperCase() + r.type.slice(1)}</span>
              <span>${new Date(r.savedAt).toLocaleDateString()}</span>
            </div>
            <div class="routine-card-buttons">
              <button class="routine-card-btn" onclick="loadRoutineFromLibrary('${r.filename.replace(/'/g, "\\'")}')">Load</button>
              <button class="routine-card-btn delete" onclick="deleteRoutineFromLibrary('${r.filename.replace(/'/g, "\\'")}', '${r.sha}')">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        content.innerHTML = `<div class="library-empty error">Error: ${err.message}</div>`;
      }
    }

    async function loadRoutineFromLibrary(filename) {
      try {
        const token = localStorage.getItem('gh_token');
        if (!token) throw new Error('GitHub token not set');
        
        const resp = await fetch(`https://api.github.com/repos/jl-ccommits/pilates/contents/routines/${filename}?ref=sandbox`, {
          headers: { Authorization: `token ${token}` }
        });
        
        if (!resp.ok) throw new Error('Failed to load routine');
        
        const file = await resp.json();
        const fileResp = await fetch(file.download_url);
        const data = await fileResp.json();
        
        blocks = data.blocks || [];
        discipline = data.type || 'pilates';
        routineName = data.name || 'My Routine';
        checkedSteps = {};
        collapsedBlocks = {};
        
        document.getElementById('libraryPanel').classList.add('hidden');
        document.getElementById('libraryOverlay').classList.add('hidden');
        render();
      } catch (err) {
        alert('Error loading routine: ' + err.message);
      }
    }

    async function deleteRoutineFromLibrary(filename, sha) {
      if (!confirm('Delete this routine?')) return;
      
      try {
        const token = localStorage.getItem('gh_token');
        if (!token) throw new Error('GitHub token not set');
        
        const resp = await fetch(`https://api.github.com/repos/jl-ccommits/pilates/contents/routines/${filename}`, {
          method: 'DELETE',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Delete routine: ${filename}`, sha, branch: 'sandbox' })
        });
        
        if (!resp.ok) throw new Error('Failed to delete routine');
        
        loadRoutinesList();
      } catch (err) {
        alert('Error deleting routine: ' + err.message);
      }
    }

    function showNewYogaModal() {
      const html = `
